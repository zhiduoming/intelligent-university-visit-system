<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>认证中心 | UniTour</title>
  <link rel="stylesheet" href="/css/unitour.css?v=20260503i">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/index.html">
      <span class="brand-mark">U</span>
      <span>UniTour<small>认证与个人资料</small></span>
    </a>
    <nav class="nav">
      <a href="/index.html">首页</a>
      <a href="/universities.html">高校库</a>
      <a href="/campus-pois.html">POI</a>
    </nav>
  </div>
</header>

<main>
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-auth-tab="login" type="button">登录</button>
        <button class="auth-tab" data-auth-tab="register" type="button">注册</button>
      </div>

      <section class="auth-form active" id="loginForm">
        <label class="input-shell">
          <span class="input-icon">□</span>
          <input id="loginUsername" autocomplete="username" placeholder="用户名 / 手机号">
        </label>
        <label class="input-shell">
          <span class="input-icon">▣</span>
          <input id="loginPassword" autocomplete="current-password" type="password" placeholder="密码">
          <button class="plain-icon-btn" data-toggle-password="loginPassword" type="button">显示</button>
        </label>
        <div class="auth-subline">
          <span></span>
          <a id="forgotLink" href="javascript:void(0)">忘记密码?</a>
        </div>
        <button class="btn primary" id="loginBtn" type="button" style="width:100%;font-size:1.08rem">登录</button>
        <div class="token-box" id="loginMsg"></div>
        <div class="auth-divider">注册后可在个人中心进行学校验证</div>
      </section>

      <section class="auth-form" id="registerForm">
        <label class="input-shell">
          <span class="input-icon">人</span>
          <input id="registerNickname" autocomplete="nickname" placeholder="昵称（选填，登录后可修改）">
        </label>
        <label class="input-shell">
          <span class="input-icon">□</span>
          <input id="registerUsername" autocomplete="username" placeholder="用户名">
        </label>
        <label class="input-shell">
          <span class="input-icon">手</span>
          <input id="registerPhone" autocomplete="tel" placeholder="手机号（用于手机号登录和找回密码）">
        </label>
        <label class="input-shell">
          <span class="input-icon">▣</span>
          <input id="registerPassword" autocomplete="new-password" type="password" placeholder="密码">
          <button class="plain-icon-btn" data-toggle-password="registerPassword" type="button">显示</button>
        </label>
        <div class="captcha-row">
          <label class="input-shell">
            <span class="input-icon">验</span>
            <input id="captchaInput" placeholder="请输入验证码">
          </label>
          <button class="captcha-box" id="captchaBox" type="button">5DjQ</button>
        </div>
        <button class="btn primary" id="registerBtn" type="button" style="width:100%;font-size:1.08rem">注册</button>
        <div class="token-box" id="registerMsg"></div>
        <div class="auth-divider">注册后可在个人中心进行学校验证</div>
      </section>

      <section class="auth-form" id="forgotForm">
        <label class="input-shell">
          <span class="input-icon">□</span>
          <input id="forgotUsername" autocomplete="username" placeholder="用户名">
        </label>
        <label class="input-shell">
          <span class="input-icon">手</span>
          <input id="forgotPhone" autocomplete="tel" placeholder="绑定手机号">
        </label>
        <label class="input-shell">
          <span class="input-icon">▣</span>
          <input id="forgotPassword" autocomplete="new-password" type="password" placeholder="新密码，不少于 6 位">
          <button class="plain-icon-btn" data-toggle-password="forgotPassword" type="button">显示</button>
        </label>
        <div class="auth-subline">
          <a id="backToLoginLink" href="javascript:void(0)">返回登录</a>
          <span></span>
        </div>
        <button class="btn primary" id="forgotBtn" type="button" style="width:100%;font-size:1.08rem">重置密码</button>
        <div class="token-box" id="forgotMsg"></div>
        <div class="auth-divider">当前版本使用绑定手机号辅助验证，不接入短信验证码。</div>
      </section>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="shell footer-inner">
    <span>UniTour · 认证中心</span>
    <span>JWT stored in localStorage</span>
  </div>
</footer>

<script src="/js/unitour-api.js?v=20260503f"></script>
<script src="/js/unitour-user-menu.js?v=20260503e"></script>
<script>
  const $ = (id) => document.querySelector(id);
  const redirect = UniTour.qs("redirect") || "/user-center.html";

  function switchTab(name) {
    document.querySelectorAll("[data-auth-tab]").forEach((button) => {
      button.classList.toggle("active", button.dataset.authTab === name);
    });
    $("#loginForm").classList.toggle("active", name === "login");
    $("#registerForm").classList.toggle("active", name === "register");
    $("#forgotForm").classList.toggle("active", name === "forgot");
  }

  function captchaText() {
    const source = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    return Array.from({ length: 4 }, () => source[Math.floor(Math.random() * source.length)]).join("");
  }

  document.querySelectorAll("[data-auth-tab]").forEach((button) => {
    button.addEventListener("click", () => switchTab(button.dataset.authTab));
  });

  document.querySelectorAll("[data-toggle-password]").forEach((button) => {
    button.addEventListener("click", () => {
      const input = document.querySelector(`#${button.dataset.togglePassword}`);
      const showing = input.type === "text";
      input.type = showing ? "password" : "text";
      button.textContent = showing ? "显示" : "隐藏";
    });
  });

  $("#captchaBox").addEventListener("click", () => {
    $("#captchaBox").textContent = captchaText();
  });

  $("#forgotLink").addEventListener("click", () => {
    $("#forgotUsername").value = $("#loginUsername").value.trim();
    switchTab("forgot");
  });

  $("#backToLoginLink").addEventListener("click", () => {
    switchTab("login");
  });

  $("#loginBtn").addEventListener("click", async () => {
    $("#loginMsg").textContent = "正在登录...";
    try {
      const data = await UniTour.login({
        username: $("#loginUsername").value.trim(),
        password: $("#loginPassword").value
      });
      UniTour.setToken(data.token);
      $("#loginMsg").textContent = `登录成功：${data.nickname || data.username}`;
      setTimeout(() => {
        location.href = redirect;
      }, 500);
    } catch (error) {
      $("#loginMsg").textContent = `登录失败：${error.message}`;
    }
  });

  $("#registerBtn").addEventListener("click", async () => {
    $("#registerMsg").textContent = "正在注册...";
    const captcha = $("#captchaInput").value.trim();
    if (captcha && captcha.toLowerCase() !== $("#captchaBox").textContent.trim().toLowerCase()) {
      $("#registerMsg").textContent = "验证码不正确。当前验证码只做前端占位，后续可以接后端接口。";
      return;
    }
    try {
      await UniTour.register({
        username: $("#registerUsername").value.trim(),
        phone: $("#registerPhone").value.trim(),
        nickname: $("#registerNickname").value.trim(),
        password: $("#registerPassword").value
      });
      $("#registerMsg").textContent = "注册成功，现在可以登录。";
      switchTab("login");
      $("#loginUsername").value = $("#registerUsername").value.trim();
    } catch (error) {
      $("#registerMsg").textContent = `注册失败：${error.message}`;
    }
  });

  $("#forgotBtn").addEventListener("click", async () => {
    $("#forgotMsg").textContent = "正在重置密码...";
    try {
      await UniTour.forgotPassword({
        username: $("#forgotUsername").value.trim(),
        phone: $("#forgotPhone").value.trim(),
        newPassword: $("#forgotPassword").value
      });
      $("#forgotMsg").textContent = "密码已重置，现在可以用用户名或手机号登录。";
      $("#loginUsername").value = $("#forgotUsername").value.trim();
      $("#loginPassword").value = "";
      setTimeout(() => switchTab("login"), 600);
    } catch (error) {
      $("#forgotMsg").textContent = `重置失败：${error.message}`;
    }
  });
</script>
</body>
</html>
