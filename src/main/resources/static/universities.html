<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高校库 | UniTour</title>
  <link rel="stylesheet" href="/css/unitour.css?v=20260503i">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/index.html">
      <span class="brand-mark">U</span>
      <span>UniTour<small>高校库与校区认知</small></span>
    </a>
    <nav class="nav">
      <a href="/index.html">首页</a>
      <a class="active" href="/universities.html">高校库</a>
      <a href="/campus-pois.html">POI</a>
    </nav>
  </div>
</header>

<main>
  <section class="catalog-hero">
    <div class="shell catalog-hero-inner">
      <div>
        <span class="eyebrow light">University Atlas</span>
        <h1>高校库</h1>
        <p>按学校、地区和城市筛选，先判断一所学校最值得关注的校园体验，再进入详情页看校区、POI、评分和评价。</p>
      </div>
      <div class="catalog-hero-stat">
        <strong>20</strong>
        <span>已维护高校</span>
      </div>
    </div>
  </section>

  <section class="section catalog-section">
    <div class="shell">
      <div class="toolbar catalog-toolbar">
        <div class="field">
          <label for="keyword">关键词</label>
          <input id="keyword" placeholder="北邮 / 电子 / 深圳">
        </div>
        <div class="field">
          <label for="province">省份</label>
          <input id="province" placeholder="北京">
        </div>
        <div class="field">
          <label for="city">城市</label>
          <input id="city" placeholder="北京">
        </div>
        <button class="btn primary" id="searchBtn" type="button">查询</button>
      </div>

      <div class="catalog-result-bar">
        <div class="notice compact" id="summary">正在加载高校数据...</div>
        <span id="pageText" style="color:var(--muted);font-weight:750"></span>
      </div>
      <div class="uni-list catalog" id="list"></div>

      <div class="actions catalog-pager">
        <button class="btn line" id="prevBtn" type="button">上一页</button>
        <button class="btn line" id="nextBtn" type="button">下一页</button>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="shell footer-inner">
    <span>UniTour · 高校库</span>
    <span>Click school cards to enter detail pages</span>
  </div>
</footer>

<script src="/js/unitour-api.js?v=20260503e"></script>
<script src="/js/unitour-user-menu.js?v=20260503e"></script>
<script>
  const state = { page: 1, size: 9, total: 0, keyword: "", province: "", city: "" };
  const $ = (id) => document.querySelector(id);

  function iconUrl(item) {
    if (item.logoUrl) return item.logoUrl;
    try {
      const url = new URL(item.officialWebsite || "");
      return `${url.origin}/favicon.ico`;
    } catch {
      return "";
    }
  }

  function tagHtml(item, excludedTags = []) {
    const excluded = new Set(excludedTags);
    return UniTour.tags(item.tags)
      .filter((tag) => !excluded.has(tag))
      .slice(0, 5)
      .map((tag) => `<span class="tag ${tag.includes("985") || tag.includes("211") || tag.includes("双一流") ? "hot" : ""}">${UniTour.escapeHtml(tag)}</span>`)
      .join("");
  }

  function universityCard(item) {
    const favicon = iconUrl(item);
    const fallback = UniTour.escapeHtml((item.shortName || item.name || "U").slice(0, 2));
    const reviewCount = item.reviewCount || 0;
    const score = item.overallScore ? UniTour.formatScore(item.overallScore) : "-";
    const focus = item.description || "可从校区、POI 和评价中继续了解这所高校。";
    const primaryTags = [
      item.is985 ? "985" : "",
      item.is211 ? "211" : "",
      item.isDoubleFirstClass ? "双一流" : ""
    ].filter(Boolean);
    return `
      <article class="uni-card">
        <a class="uni-card-link" href="/university-detail.html?id=${item.id}" aria-label="进入${UniTour.escapeHtml(item.name)}详情页"></a>
        <div class="uni-card-head">
          <div class="school-logo compact">
            ${favicon ? `<img src="${favicon}" alt="${UniTour.escapeHtml(item.name)}校徽" onerror="this.parentElement.innerHTML='${fallback}'">` : fallback}
          </div>
          <div class="uni-card-title">
            <h3>${UniTour.escapeHtml(item.name)}</h3>
            <p>${UniTour.escapeHtml(item.province || "-")} · ${UniTour.escapeHtml(item.city || "-")} · ${UniTour.escapeHtml(item.schoolType || "高校")} · ${UniTour.escapeHtml(item.educationLevel || "本科")}</p>
          </div>
          <div class="score-block">
            <strong>${score}</strong>
            <span>综合</span>
          </div>
        </div>
        <div class="decision-tags">
          ${primaryTags.map((tag) => `<span class="tag hot">${tag}</span>`).join("")}
          ${tagHtml(item, primaryTags)}
        </div>
        <div class="decision-focus">
          <strong>认知重点</strong>
          <p>${UniTour.escapeHtml(focus.length > 86 ? `${focus.slice(0, 86)}...` : focus)}</p>
        </div>
        <div class="uni-card-foot">
          <span>${reviewCount} 条评价</span>
          <div>
            <a href="/university-detail.html?id=${item.id}">详情</a>
            <a href="/campus-pois.html?universityId=${item.id}">POI</a>
          </div>
        </div>
      </article>
    `;
  }

  async function loadList() {
    $("#summary").textContent = "正在加载高校数据...";
    $("#list").innerHTML = "";
    try {
      const data = await UniTour.listUniversities({
        page: state.page,
        size: state.size,
        keyword: state.keyword,
        province: state.province,
        city: state.city
      });
      state.total = data.total || 0;
      const list = data.list || [];
      $("#summary").textContent = `共 ${state.total} 所高校，当前第 ${data.page || state.page} 页。`;
      $("#list").innerHTML = list.length ? list.map(universityCard).join("") : `<div class="empty">没有匹配的高校。</div>`;
      $("#pageText").textContent = `第 ${state.page} 页 / 每页 ${state.size} 条`;
      $("#prevBtn").disabled = state.page <= 1;
      $("#nextBtn").disabled = state.page * state.size >= state.total;
    } catch (error) {
      $("#summary").innerHTML = `<span style="color:var(--red)">加载失败：${UniTour.escapeHtml(error.message)}</span>`;
    }
  }

  $("#searchBtn").addEventListener("click", () => {
    state.page = 1;
    state.keyword = $("#keyword").value.trim();
    state.province = $("#province").value.trim();
    state.city = $("#city").value.trim();
    loadList();
  });
  $("#prevBtn").addEventListener("click", () => {
    if (state.page > 1) {
      state.page -= 1;
      loadList();
    }
  });
  $("#nextBtn").addEventListener("click", () => {
    if (state.page * state.size < state.total) {
      state.page += 1;
      loadList();
    }
  });

  loadList();
</script>
</body>
</html>
