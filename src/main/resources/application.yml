
spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Intelligent-University-Visit-System
  datasource:
    url: ${UNITOUR_MYSQL_URL:jdbc:mysql://localhost:3307/uni_tour}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${UNITOUR_MYSQL_USERNAME:root}
    password: ${UNITOUR_MYSQL_ROOT_PASSWORD}
  data:
    redis:
      host: ${UNITOUR_REDIS_HOST:localhost}
      port: ${UNITOUR_REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: ${UNITOUR_MAX_FILE_SIZE:10MB}
      max-request-size: ${UNITOUR_MAX_REQUEST_SIZE:10MB}

unitour:
  oss:
    endpoint: ${UNITOUR_OSS_ENDPOINT:}
    access-key-id: ${UNITOUR_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${UNITOUR_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${UNITOUR_OSS_BUCKET_NAME:}
    public-base-url: ${UNITOUR_OSS_PUBLIC_BASE_URL:}
    avatar-dir: ${UNITOUR_OSS_AVATAR_DIR:avatars}

# MyBatis 日志默认关闭；排查 SQL 时可通过 UNITOUR_MYBATIS_LOG_IMPL 打开 StdOutImpl。
mybatis:
  configuration:
    log-impl: ${UNITOUR_MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
    map-underscore-to-camel-case: true
