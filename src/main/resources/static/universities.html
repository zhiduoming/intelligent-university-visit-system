<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高校库 | UniTour</title>
  <link rel="stylesheet" href="/css/unitour.css?v=20260503b">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/index.html">
      <span class="brand-mark">U</span>
      <span>UniTour<small>高校库与校区认知</small></span>
    </a>
    <nav class="nav">
      <a href="/index.html">首页</a>
      <a class="active" href="/universities.html">高校库</a>
      <a href="/campus-pois.html">校区 POI</a>
      <a href="/open-day.html">项目亮点</a>
      <a href="/auth-center.html">登录</a>
    </nav>
  </div>
</header>

<main>
  <section class="page-hero">
    <div class="shell">
      <span class="eyebrow" style="color:var(--teal-2);border-color:var(--line);background:#fffdf8">University Atlas</span>
      <h1>先选学校，再进入完整详情页。</h1>
      <p>高校库只负责清晰浏览和筛选，不把复杂详情挤在右侧小空间里。点击高校卡片后进入独立详情页，校区、POI、评分和评论都在那里展开。</p>
    </div>
  </section>

  <section class="section">
    <div class="shell">
      <div class="toolbar">
        <div class="field">
          <label for="keyword">关键词</label>
          <input id="keyword" placeholder="北邮 / 电子 / 深圳">
        </div>
        <div class="field">
          <label for="province">省份</label>
          <input id="province" placeholder="北京">
        </div>
        <div class="field">
          <label for="city">城市</label>
          <input id="city" placeholder="北京">
        </div>
        <button class="btn primary" id="searchBtn" type="button">查询</button>
      </div>

      <div class="notice" id="summary">正在加载高校数据...</div>
      <div class="uni-list catalog" id="list" style="margin-top:14px"></div>

      <div class="actions" style="margin-top:18px">
        <button class="btn line" id="prevBtn" type="button">上一页</button>
        <button class="btn line" id="nextBtn" type="button">下一页</button>
        <span id="pageText" style="color:var(--muted);font-weight:750"></span>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="shell footer-inner">
    <span>UniTour · 高校库</span>
    <span>Click school cards to enter detail pages</span>
  </div>
</footer>

<script src="/js/unitour-api.js"></script>
<script>
  const state = { page: 1, size: 9, total: 0, keyword: "", province: "", city: "" };
  const $ = (id) => document.querySelector(id);

  function iconUrl(item) {
    try {
      const url = new URL(item.officialWebsite || item.logoUrl || "");
      return `${url.origin}/favicon.ico`;
    } catch {
      return "";
    }
  }

  function tagHtml(item) {
    return UniTour.tags(item.tags).slice(0, 5)
      .map((tag) => `<span class="tag ${tag.includes("985") || tag.includes("211") || tag.includes("双一流") ? "hot" : ""}">${UniTour.escapeHtml(tag)}</span>`)
      .join("");
  }

  function universityCard(item) {
    const favicon = iconUrl(item);
    const fallback = UniTour.escapeHtml((item.shortName || item.name || "U").slice(0, 2));
    return `
      <article class="uni-card">
        <div class="uni-card-top">
          <div class="school-logo">
            ${favicon ? `<img src="${favicon}" alt="${UniTour.escapeHtml(item.name)}图标" onerror="this.remove();this.parentElement.textContent='${fallback}'">` : fallback}
          </div>
          <div>
            <h3>${UniTour.escapeHtml(item.name)}</h3>
            <p>${UniTour.escapeHtml(item.description || "暂无介绍")}</p>
          </div>
        </div>
        <div class="tags">
          <span class="tag">${UniTour.escapeHtml(item.province || "-")} · ${UniTour.escapeHtml(item.city || "-")}</span>
          <span class="tag">${UniTour.escapeHtml(item.schoolType || "高校")}</span>
          <span class="tag">综合评分 ${UniTour.formatScore(item.overallScore)}</span>
          <span class="tag">评价 ${item.reviewCount || 0}</span>
          ${tagHtml(item)}
        </div>
        <div class="card-actions">
          <a class="btn primary" href="/university-detail.html?id=${item.id}">进入详情页</a>
          <a class="btn line" href="/campus-pois.html?universityId=${item.id}">校区 POI</a>
        </div>
      </article>
    `;
  }

  async function loadList() {
    $("#summary").textContent = "正在加载高校数据...";
    $("#list").innerHTML = "";
    try {
      const data = await UniTour.listUniversities({
        page: state.page,
        size: state.size,
        keyword: state.keyword,
        province: state.province,
        city: state.city
      });
      state.total = data.total || 0;
      const list = data.list || [];
      $("#summary").textContent = `共 ${state.total} 所高校，当前第 ${data.page || state.page} 页。`;
      $("#list").innerHTML = list.length ? list.map(universityCard).join("") : `<div class="empty">没有匹配的高校。</div>`;
      $("#pageText").textContent = `第 ${state.page} 页 / 每页 ${state.size} 条`;
      $("#prevBtn").disabled = state.page <= 1;
      $("#nextBtn").disabled = state.page * state.size >= state.total;
    } catch (error) {
      $("#summary").innerHTML = `<span style="color:var(--red)">加载失败：${UniTour.escapeHtml(error.message)}</span>`;
    }
  }

  $("#searchBtn").addEventListener("click", () => {
    state.page = 1;
    state.keyword = $("#keyword").value.trim();
    state.province = $("#province").value.trim();
    state.city = $("#city").value.trim();
    loadList();
  });
  $("#prevBtn").addEventListener("click", () => {
    if (state.page > 1) {
      state.page -= 1;
      loadList();
    }
  });
  $("#nextBtn").addEventListener("click", () => {
    if (state.page * state.size < state.total) {
      state.page += 1;
      loadList();
    }
  });

  loadList();
</script>
</body>
</html>
