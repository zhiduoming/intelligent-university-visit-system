<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniTour · 模块预留页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#08101d; --text:#ebf3ff; --muted:#9db0d3; --line:#2b4365; --primary:#31cba4; --radius:14px; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center; color:var(--text);
      font-family:"Noto Sans SC",sans-serif;
      background: radial-gradient(circle at 10% 10%, rgba(52,98,160,.32), rgba(52,98,160,0) 44%), linear-gradient(180deg,#070f1a,#08101d);
    }
    .card {
      width:min(860px,92vw); border:1px solid var(--line); border-radius:var(--radius);
      background:linear-gradient(165deg, rgba(17,32,54,.93), rgba(11,22,38,.98));
      padding:20px;
    }
    h1 { margin:0; font-family:"Plus Jakarta Sans","Noto Sans SC",sans-serif; }
    p { color:var(--muted); line-height:1.7; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .btn {
      text-decoration:none; border-radius:9px; padding:8px 12px; font-weight:700;
      border:1px solid #3c587f; color:#deedff; background:#11223a;
    }
    .btn.main { border:0; color:#05211a; background:linear-gradient(90deg,var(--primary),#58debd); }
    .meta { margin-top:10px; color:var(--muted); font-size:.84rem; }
  </style>
</head>
<body>
<main class="card">
  <h1 id="title">模块预留页</h1>
  <p id="desc">该模块入口已预留，后端接口完成后可直接在此页面接入业务功能。</p>
  <div class="row">
    <a class="btn main" href="/index.html">返回首页</a>
    <a class="btn" href="/universities.html">进入高校探索页</a>
  </div>
  <div class="meta" id="meta">状态：开发中</div>
</main>
<script>
  const map = {
    '/campus-pois.html': { title: '校区 POI 导览', desc: '将承载校区维度的 POI 列表、筛选和路线规划视图。', status: '状态：开发中（模块入口已就位）' },
    '/auth-center.html': { title: '认证中心', desc: '将承载注册、登录、JWT、当前用户信息等认证能力。', status: '状态：开发中（等待后端闭环）' },
    '/wishes.html': { title: '愿望墙社区', desc: '将承载愿望发布、分页查询和本人删除等 UGC 能力。', status: '状态：开发中（已完成页面预留）' },
    '/reviews.html': { title: '评价中台', desc: '将承载 target_type/target_id 多态评价模型，支持高校与 POI 评分。', status: '状态：规划中（后续迭代）' },
    '/open-day.html': { title: '开放日看板', desc: '将承载开放日活动资讯、报名入口和时效性筛选。', status: '状态：规划中（后续迭代）' }
  };

  const cfg = map[location.pathname] || { title: '模块预留页', desc: '该模块入口已预留。', status: '状态：开发中' };
  document.getElementById('title').textContent = cfg.title;
  document.getElementById('desc').textContent = cfg.desc;
  document.getElementById('meta').textContent = cfg.status;
</script>
</body>
</html>
